services:

  mongodb:
    image: mongo:4.4
    container_name: transfers-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo_data:/data/db

  mysql:
    image: mysql:8.0
    container_name: transfers-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: transfers
    volumes:
      - mysql_data:/var/lib/mysql    
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: transfers-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  app:
    image: transfers-api:0.1.0
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transfers-api
    depends_on:
      - mongodb
      - mysql
    ports:
      - "8080:8080"

    environment:
      # ---- Business ----
      TRANSFER_MIN_AMOUNT: 1

      # ---- Mongo ----
      MONGODB_CONNECT_TIMEOUT: 10s
      MONGODB_HOSTNAME: mongodb
      MONGODB_PORT: 27017
      MONGODB_USERNAME: root
      MONGODB_PASSWORD: root
      MONGODB_DATABASE: transfers-db
      MONGODB_COLLECTION: transfers

      # ---- MySQL ----
      MYSQL_CONNECT_TIMEOUT: 10s
      MYSQL_HOSTNAME: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: transfers

      MYSQL_MAX_OPEN_CONNS: 25
      MYSQL_MAX_IDLE_CONNS: 25
      MYSQL_CONN_MAX_LIFETIME: 5m

    restart: always

volumes:
  mongo_data:
  mysql_data: